<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tâches — CHICOTO Merveille</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f4f3ef;
      --surface: rgba(255,255,255,.75);
      --surface-solid: #fff;
      --text: #1a1a18;
      --text2: #6b6b63;
      --text3: #9c9c94;
      --border: rgba(0,0,0,.06);
      --shadow: 0 2px 12px rgba(0,0,0,.04);
      --shadow-lg: 0 8px 40px rgba(0,0,0,.06);
      --accent: #3b3bfa;
      --accent2: #6366f1;
      --glow: rgba(59,59,250,.08);
      --radius: 16px;
      --radius-sm: 10px;
      --radius-xs: 8px;
    }
    .dark {
      --bg: #0c0c0a;
      --surface: rgba(28,28,26,.8);
      --surface-solid: #1c1c1a;
      --text: #e8e6df;
      --text2: #a0a098;
      --text3: #6b6b65;
      --border: rgba(255,255,255,.06);
      --shadow: 0 2px 12px rgba(0,0,0,.2);
      --shadow-lg: 0 8px 40px rgba(0,0,0,.3);
      --accent: #6366f1;
      --accent2: #818cf8;
      --glow: rgba(99,102,241,.12);
    }

    html { -webkit-font-smoothing: antialiased; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 0;
      margin: auto;
      transition: background .3s, color .3s;
      min-height: 100vh;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--text3); border-radius: 3px; }

    /* ── Layout ── */
    .app { max-width: 780px; margin: auto; padding: 0 1.5rem 3rem; }

    /* ── Header ── */
    .header {
      padding: 1.5rem 0 1rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      position: sticky;
      top: 0;
      z-index: 20;
      background: var(--bg);
      transition: background .3s;
    }
    .header-l { display: flex; align-items: center; gap: 14px; }
    .brand-icon {
      width: 40px; height: 40px; border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      display: flex; align-items: center; justify-content: center; color: #fff; font-size: 20px;
      box-shadow: 0 4px 12px rgba(99,102,241,.3);
      flex-shrink: 0;
    }
    .brand h1 { font-size: 18px; font-weight: 700; letter-spacing: -.3px; display: flex; align-items: center; gap: 6px; }
    .brand .sup { font-size: 12px; color: var(--text2); margin-top: 2px; display: flex; align-items: center; gap: 6px; }
    .brand .sup .dot { width: 4px; height: 4px; border-radius: 50%; background: #22c55e; display: inline-block; }
    .header-r { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .btn-icon {
      width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface);
      color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px;
      transition: all .2s; backdrop-filter: blur(8px);
    }
    .btn-icon:hover { border-color: var(--accent); color: var(--accent); background: var(--glow); }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; border: none; border-radius: 10px; padding: 9px 18px; font-size: 13px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; gap: 7px;
      transition: all .2s; box-shadow: 0 4px 14px var(--glow); font-family: inherit;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px var(--glow); }
    .btn-primary:active { transform: scale(.97); }

    /* ── Hero Stats ── */
    .hero {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 10px; margin-bottom: 1.25rem;
    }
    .hero-card {
      background: var(--surface); backdrop-filter: blur(12px);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 1rem; box-shadow: var(--shadow);
      transition: background .3s, border-color .3s;
    }
    .hero-card .h-num { font-size: 26px; font-weight: 800; letter-spacing: -.5px; line-height: 1; }
    .hero-card .h-lbl { font-size: 11px; color: var(--text2); font-weight: 500; margin-top: 4px; text-transform: uppercase; letter-spacing: .4px; }
    .hero-card .h-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .hero-card.accent {
      background: linear-gradient(135deg, var(--accent), #4f46e5);
      border-color: transparent; color: #fff;
    }
    .hero-card.accent .h-lbl { color: rgba(255,255,255,.7); }
    .hero-card.accent .h-sub { color: rgba(255,255,255,.5); }
    .hero-card.done { color: var(--text); }
    .hero-card.done .h-num { color: #22c55e; }

    /* ── Progress ── */
    .progress-section { margin-bottom: 1.25rem; }
    .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); margin-bottom: 6px; font-weight: 500; }
    .progress-track { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent), #a78bfa); transition: width .6s cubic-bezier(.22,1,.36,1); }

    /* ── Toolbar ── */
    .toolbar {
      display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap;
      align-items: center; justify-content: space-between;
    }
    .filters { display: flex; gap: 4px; flex-wrap: wrap; }
    .fbtn {
      font-size: 12px; font-weight: 500; padding: 6px 14px; border-radius: 24px;
      border: none; background: transparent; color: var(--text2); cursor: pointer;
      transition: all .2s; font-family: inherit; position: relative;
      display: flex; align-items: center; gap: 5px;
    }
    .fbtn:hover { color: var(--text); background: var(--border); }
    .fbtn.active {
      background: var(--surface); color: var(--accent); font-weight: 600;
      box-shadow: var(--shadow);
    }
    .fbtn .cnt {
      font-size: 10px; background: var(--border); border-radius: 10px;
      padding: 1px 7px; font-weight: 600; color: var(--text3);
    }
    .fbtn.active .cnt { background: var(--glow); color: var(--accent); }
    .toolbar-r { display: flex; gap: 8px; align-items: center; }
    .search-wrap {
      display: flex; align-items: center; background: var(--surface);
      border: 1px solid var(--border); border-radius: 24px; padding: 0 14px;
      transition: all .2s; backdrop-filter: blur(8px);
    }
    .search-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--glow); }
    .search-wrap .ti { color: var(--text3); font-size: 15px; }
    .search-wrap input {
      border: none; outline: none; background: transparent; padding: 8px 10px;
      font-size: 13px; width: 170px; color: var(--text); font-family: inherit;
    }
    .search-wrap input::placeholder { color: var(--text3); }

    /* ── List ── */
    .task-list { display: flex; flex-direction: column; gap: 8px; }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(16px) scale(.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .task {
      background: var(--surface); backdrop-filter: blur(12px);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 1rem 1.15rem; display: flex; align-items: flex-start; gap: 14px;
      transition: all .25s; box-shadow: var(--shadow);
      animation: cardIn .35s ease both;
      position: relative; overflow: hidden;
    }
    .task::before {
      content: ''; position: absolute; inset: 0;
      border-radius: inherit; opacity: 0;
      background: linear-gradient(135deg, var(--glow), transparent);
      transition: opacity .3s; pointer-events: none;
    }
    .task:hover::before { opacity: 1; }
    .task:hover { box-shadow: var(--shadow-lg); transform: translateY(-1px); }
    .task.done { opacity: .55; }
    .task.done:hover { opacity: .7; }
    .task.done .tname { text-decoration: line-through; color: var(--text3); }

    /* Checkbox */
    .chk-wrap {
      width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
      margin-top: 1px; position: relative; cursor: pointer;
    }
    .chk-wrap input { position: absolute; opacity: 0; pointer-events: none; }
    .chk-vis {
      width: 100%; height: 100%; border-radius: 50%;
      border: 2px solid var(--text3); display: flex;
      align-items: center; justify-content: center;
      transition: all .25s; font-size: 14px; color: #fff;
    }
    .chk-wrap:hover .chk-vis { border-color: #22c55e; transform: scale(1.08); }
    .chk-wrap input:checked + .chk-vis {
      background: #22c55e; border-color: #22c55e;
      animation: pop .3s ease;
    }
    .chk-wrap input:checked + .chk-vis::after { content: '✓'; font-weight: 700; }
    @keyframes pop { 0% { transform: scale(.7); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }

    .task-body { flex: 1; min-width: 0; }
    .tname { font-size: 14px; font-weight: 500; line-height: 1.45; }
    .tmeta { display: flex; gap: 8px; margin-top: 6px; align-items: center; flex-wrap: wrap; }
    .badge {
      font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 600;
      letter-spacing: .2px;
    }
    .b-Production  { background: #dcfce7; color: #166534; }
    .b-Communication { background: #dbeafe; color: #1e40af; }
    .b-Stock { background: #fef3c7; color: #92400e; }
    .b-Data { background: #ede9fe; color: #5b21b6; }
    .b-Vente { background: #fce7f3; color: #9d174d; }
    .dark .b-Production  { background: rgba(34,197,94,.12); color: #4ade80; }
    .dark .b-Communication { background: rgba(59,130,246,.12); color: #93c5fd; }
    .dark .b-Stock { background: rgba(234,179,8,.12); color: #fcd34d; }
    .dark .b-Data { background: rgba(139,92,246,.12); color: #a78bfa; }
    .dark .b-Vente { background: rgba(236,72,153,.12); color: #f9a8d4; }
    .freq { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 4px; }
    .freq .ti { font-size: 12px; }
    .date-done { font-size: 11px; color: var(--text3); margin-top: 6px; display: flex; align-items: center; gap: 4px; }

    .task-actions {
      display: flex; gap: 2px; flex-shrink: 0; margin-top: 0;
      opacity: 0; transition: opacity .2s; align-items: center;
    }
    .task:hover .task-actions { opacity: 1; }
    @media (hover: none) { .task-actions { opacity: 1; } }
    .task-actions button {
      background: none; border: none; cursor: pointer; color: var(--text3);
      padding: 5px; border-radius: 8px; display: flex; align-items: center;
      justify-content: center; transition: all .15s; font-size: 16px;
    }
    .task-actions .edit-btn:hover { color: var(--accent); background: var(--glow); }
    .task-actions .del-btn:hover { color: #ef4444; background: rgba(239,68,68,.1); }

    /* ── Categories ── */
    .cat-strip { margin-bottom: 1.25rem; display: flex; gap: 8px; flex-wrap: wrap; }
    .cat-chip {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 12px; font-size: 12px; font-weight: 600;
      background: var(--surface); border: 1px solid var(--border);
      cursor: pointer; transition: all .2s; font-family: inherit; color: var(--text2);
    }
    .cat-chip:hover { border-color: var(--accent); color: var(--accent); }
    .cat-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .cat-chip .cd { width: 8px; height: 8px; border-radius: 50%; }
    .cat-chip .cc { font-size: 10px; color: var(--text3); margin-left: 2px; }
    .cat-chip.active .cc { color: rgba(255,255,255,.6); }

    /* ── Empty ── */
    .empty {
      text-align: center; padding: 3.5rem 2rem;
      background: var(--surface); border-radius: var(--radius);
      border: 1px dashed var(--border); animation: cardIn .35s ease;
    }
    .empty .ti { font-size: 44px; color: var(--text3); display: block; margin-bottom: 12px; }
    .empty p { color: var(--text2); font-size: 14px; line-height: 1.7; }
    .empty .btn-primary { margin: 16px auto 0; display: inline-flex; }

    /* ── Modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,.5); backdrop-filter: blur(8px);
      align-items: center; justify-content: center; padding: 1rem;
    }
    .modal-overlay.open { display: flex; }
    @keyframes modalIn { from { opacity: 0; transform: scale(.92) translateY(12px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    .modal {
      background: var(--surface-solid); border-radius: 20px;
      padding: 1.75rem; width: 100%; max-width: 440px;
      box-shadow: 0 20px 60px rgba(0,0,0,.15);
      animation: modalIn .3s ease; max-height: 90vh; overflow-y: auto;
      border: 1px solid var(--border);
    }
    .modal h2 { font-size: 17px; font-weight: 700; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 10px; }
    .modal label { font-size: 12px; font-weight: 600; color: var(--text2); display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .4px; }
    .modal input, .modal select, .modal textarea {
      width: 100%; padding: 10px 14px; border: 1px solid var(--border);
      border-radius: var(--radius-sm); font-size: 14px; outline: none;
      transition: border-color .2s, box-shadow .2s; margin-bottom: 14px;
      font-family: inherit; background: var(--bg); color: var(--text);
    }
    .modal input:focus, .modal select:focus, .modal textarea:focus {
      border-color: var(--accent); box-shadow: 0 0 0 3px var(--glow);
    }
    .modal textarea { resize: vertical; min-height: 50px; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 6px; }
    .modal-actions button { padding: 9px 22px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all .15s; font-family: inherit; }
    .btn-cancel { background: var(--border); color: var(--text2); }
    .btn-cancel:hover { background: var(--text3); color: #fff; }
    .btn-save { background: var(--accent); color: #fff; }
    .btn-save:hover { background: var(--accent2); }

    /* ── Toast ── */
    .toast-c {
      position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 200;
      display: flex; flex-direction: column; gap: 8px;
    }
    .toast {
      background: var(--surface-solid); border: 1px solid var(--border);
      color: var(--text); padding: 12px 18px; border-radius: 14px;
      font-size: 13px; font-weight: 500; display: flex;
      align-items: center; gap: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,.12);
      animation: toastIn .35s ease; max-width: 360px;
    }
    @keyframes toastIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes toastOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(20px); } }
    .toast.rm { animation: toastOut .25s ease forwards; }
    .toast .tu { background: none; border: none; color: var(--accent); font-weight: 700; cursor: pointer; padding: 4px 8px; border-radius: 8px; font-size: 12px; }
    .toast .tu:hover { background: var(--glow); }
    .toast .tc { background: none; border: none; color: var(--text3); cursor: pointer; padding: 2px; font-size: 16px; margin-left: auto; }

    /* ── FAB ── */
    .fab {
      display: none; position: fixed; bottom: 1.5rem; right: 1.5rem;
      width: 54px; height: 54px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; border: none; font-size: 24px; cursor: pointer;
      box-shadow: 0 6px 24px var(--glow); z-index: 50;
      align-items: center; justify-content: center; transition: transform .15s;
    }
    .fab:hover { transform: scale(1.06); }
    .fab:active { transform: scale(.93); }
    @media (max-width: 500px) { .btn-primary.desk { display: none; } .fab { display: flex; } }

    /* ── Confetti ── */
    @keyframes confFall { 0% { transform: translateY(-10px) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
    .conf { position: fixed; width: 8px; height: 8px; border-radius: 2px; z-index: 300; pointer-events: none; animation: confFall 2.8s ease-in forwards; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .app { padding: 0 1rem 2rem; }
      .header { padding: 1rem 0 .75rem; }
      .brand h1 { font-size: 16px; }
      .brand-icon { width: 34px; height: 34px; font-size: 16px; }
      .hero { grid-template-columns: 1fr 1fr; }
      .hero-card:last-child { grid-column: 1 / -1; }
      .toolbar { flex-direction: column; align-items: stretch; }
      .search-wrap input { width: 100%; }
      .toolbar-r { width: 100%; }
      .search-wrap { flex: 1; }
      .toast-c { left: 1rem; right: 1rem; bottom: 1rem; }
      .toast { max-width: 100%; }
    }
  </style>
</head>
<body>

<div class="app">

  <!-- Header -->
  <header class="header">
    <div class="header-l">
      <div class="brand-icon"><i class="ti ti-list-check"></i></div>
      <div class="brand">
        <h1>CHICOTO <span style="font-weight:400;color:var(--text2)">· Tâches</span></h1>
        <div class="sup"><span class="dot"></span> Superviseur · 0193555815 / 013669659</div>
      </div>
    </div>
    <div class="header-r">
      <button class="btn-icon" id="themeBtn" onclick="toggleTheme()" title="Thème"><i class="ti ti-moon"></i></button>
      <button class="btn-primary desk" onclick="openModal()"><i class="ti ti-plus"></i> Nouvelle</button>
    </div>
  </header>

  <!-- Hero Stats -->
  <div class="hero" id="hero"></div>

  <!-- Progress -->
  <div class="progress-section" id="progressSection"></div>

  <!-- Catégories chips -->
  <div class="cat-strip" id="catStrip"></div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="filters" id="filterBar">
      <button class="fbtn active" data-f="toutes">Toutes <span class="cnt" id="cntAll">0</span></button>
      <button class="fbtn" data-f="en cours">En cours <span class="cnt" id="cntActive">0</span></button>
      <button class="fbtn" data-f="faites">Faites <span class="cnt" id="cntDone">0</span></button>
    </div>
    <div class="toolbar-r">
      <div class="search-wrap">
        <i class="ti ti-search"></i>
        <input type="text" id="searchInput" placeholder="Rechercher..." oninput="render()" />
      </div>
      <button class="btn-icon" onclick="toggleSort()" id="sortBtn" title="Trier"><i class="ti ti-arrows-sort"></i></button>
    </div>
  </div>

  <!-- Task List -->
  <div class="task-list" id="list"></div>

  <!-- FAB -->
  <button class="fab" onclick="openModal()"><i class="ti ti-plus"></i></button>

</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2><i class="ti ti-pencil" style="color:var(--accent)"></i> <span id="modalTitle">Nouvelle tâche</span></h2>
    <label>Nom de la tâche</label>
    <input type="text" id="taskName" placeholder="Ex: Vérifier les stocks" />
    <label>Catégorie</label>
    <select id="taskCat">
      <option value="Production">Production</option>
      <option value="Communication">Communication</option>
      <option value="Stock">Stock</option>
      <option value="Vente">Vente</option>
      <option value="Data">Data</option>
    </select>
    <label>Fréquence</label>
    <select id="taskFreq">
      <option>Quotidien</option><option>Hebdomadaire</option>
      <option>Vendredi</option><option>Régulier</option>
      <option>Au besoin</option><option>Mensuel</option>
    </select>
    <label>Note</label>
    <textarea id="taskNote" placeholder="Ajouter une note..."></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-save" id="saveBtn" onclick="saveTask()">Ajouter</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-c" id="toastC"></div>

<script>
  // ─── State ───
  const ST = 'chicoto_tasks2';
  const TH = 'chicoto_theme2';
  let tasks = [], filter = 'toutes', sortDir = 'desc', editId = null, nextId = 1;

  const CATS = ['Production','Communication','Stock','Vente','Data'];
  const CAT_COLORS = {
    Production:'#22c55e', Communication:'#3b82f6', Stock:'#eab308',
    Vente:'#ec4899', Data:'#8b5cf6'
  };
  const catClass = {};
  CATS.forEach(c => { catClass[c] = 'b-'+c; });

  // ─── Theme ───
  function toggleTheme() {
    document.body.classList.toggle('dark');
    const d = document.body.classList.contains('dark');
    localStorage.setItem(TH, d ? 'dark' : 'light');
    document.getElementById('themeBtn').innerHTML = d ? '<i class="ti ti-sun"></i>' : '<i class="ti ti-moon"></i>';
  }
  function loadTheme() {
    const s = localStorage.getItem(TH);
    const p = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if ((s && s==='dark') || (!s && p)) document.body.classList.add('dark');
    document.getElementById('themeBtn').innerHTML = document.body.classList.contains('dark') ? '<i class="ti ti-sun"></i>' : '<i class="ti ti-moon"></i>';
  }

  // ─── Persistence ───
  function loadTasks() {
    try {
      const r = localStorage.getItem(ST);
      if (r) { const p = JSON.parse(r); if (Array.isArray(p) && p.length) { tasks = p; nextId = Math.max(...p.map(t=>t.id))+1; return; } }
    } catch(_) {}
    const n = Date.now();
    tasks = [
      { id:nextId++, name:"S'assurer de l'accomplissement effectif des tâches", cat:"Production", freq:"Quotidien", note:"", createdAt:n-800000, done:false },
      { id:nextId++, name:"Informer le supérieur des anomalies liées à la production", cat:"Production", freq:"Au besoin", note:"", createdAt:n-700000, done:false },
      { id:nextId++, name:"Gérer le stock de matières premières", cat:"Stock", freq:"Quotidien", note:"", createdAt:n-600000, done:false },
      { id:nextId++, name:"Alerter le supérieur pour l'approvisionnement", cat:"Stock", freq:"Au besoin", note:"", createdAt:n-500000, done:false },
      { id:nextId++, name:"Introduire toutes les données dans l'application", cat:"Data", freq:"Quotidien", note:"", createdAt:n-400000, done:false },
      { id:nextId++, name:"Trouver des marchés actifs", cat:"Vente", freq:"Régulier", note:"", createdAt:n-300000, done:false },
      { id:nextId++, name:"Appeler les clients le vendredi pour un feedback", cat:"Communication", freq:"Vendredi", note:"", createdAt:n-200000, done:false },
      { id:nextId++, name:"Coordonner avec la vendeuse itinérante", cat:"Communication", freq:"Régulier", note:"", createdAt:n-100000, done:false },
    ];
    save();
  }
  function save() { localStorage.setItem(ST, JSON.stringify(tasks)); }

  // ─── Toast ───
  function toast(msg, undoFn) {
    const c = document.getElementById('toastC');
    const el = document.createElement('div'); el.className = 'toast';
    el.innerHTML = `<span>${msg}</span>${undoFn ? `<button class="tu" onclick="(${undoFn.toString()})();this.closest('.toast').classList.add('rm');setTimeout(()=>this.closest('.toast').remove(),300)">Annuler</button>` : ''}<button class="tc" onclick="this.closest('.toast').classList.add('rm');setTimeout(()=>this.closest('.toast').remove(),300)"><i class="ti ti-x"></i></button>`;
    c.appendChild(el);
    setTimeout(() => { el.classList.add('rm'); setTimeout(() => el.remove(), 300); }, 3500);
  }

  // ─── Confetti ───
  function confetti() {
    const colors = ['#6366f1','#22c55e','#f59e0b','#ef4444','#8b5cf6','#ec4899','#3b82f6'];
    for (let i = 0; i < 50; i++) {
      const el = document.createElement('div'); el.className = 'conf';
      el.style.left = Math.random()*100+'vw'; el.style.background = colors[i%colors.length];
      el.style.width = (4+Math.random()*6)+'px'; el.style.height = (4+Math.random()*6)+'px';
      el.style.borderRadius = Math.random()>.5 ? '50%' : '2px';
      el.style.animationDuration = (1.5+Math.random()*1.5)+'s';
      el.style.animationDelay = (Math.random()*.4)+'s';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }
  }

  // ─── Modal ───
  function openModal(t) {
    editId = t ? t.id : null;
    document.getElementById('modalTitle').textContent = t ? 'Modifier la tâche' : 'Nouvelle tâche';
    document.getElementById('saveBtn').textContent = t ? 'Enregistrer' : 'Ajouter';
    document.getElementById('taskName').value = t ? t.name : '';
    document.getElementById('taskCat').value = t ? t.cat : 'Production';
    document.getElementById('taskFreq').value = t ? t.freq : 'Quotidien';
    document.getElementById('taskNote').value = t ? (t.note||'') : '';
    document.getElementById('modal').classList.add('open');
    document.getElementById('taskName').focus();
  }
  function closeModal() { document.getElementById('modal').classList.remove('open'); editId = null; }

  function saveTask() {
    const name = document.getElementById('taskName').value.trim();
    if (!name) { alert('Veuillez entrer un nom.'); return; }
    const cat = document.getElementById('taskCat').value;
    const freq = document.getElementById('taskFreq').value;
    const note = document.getElementById('taskNote').value.trim();
    if (editId) {
      const t = tasks.find(x=>x.id===editId);
      if (t) { t.name = name; t.cat = cat; t.freq = freq; t.note = note; }
    } else {
      tasks.push({ id:nextId++, name, cat, freq, note, createdAt:Date.now(), done:false });
    }
    save(); closeModal(); render();
  }

  // ─── Actions ───
  function toggleDone(id) {
    const t = tasks.find(x=>x.id===id);
    if (!t) return;
    const was = t.done; t.done = !t.done; t.dateDone = t.done ? Date.now() : undefined;
    save(); render();
    if (t.done && !was) {
      const p = Math.round(tasks.filter(x=>x.done).length/tasks.length*100);
      if (p===100) { setTimeout(confetti, 200); toast('🎉 Toutes les tâches sont accomplies !'); }
    }
  }
  function editTask(id) { const t = tasks.find(x=>x.id===id); if (t) openModal(t); }
  function deleteTask(id) {
    const t = tasks.find(x=>x.id===id); if (!t) return;
    const n = t.name; const bk = {...t};
    tasks = tasks.filter(x=>x.id!==id); save(); render();
    toast(`« ${n} » supprimée`, function() { tasks.push(bk); save(); render(); });
  }

  // ─── Filter & Sort ───
  function setFilter(f) {
    filter = f;
    document.querySelectorAll('.fbtn').forEach(b => b.classList.toggle('active', b.dataset.f===f));
    renderCats();
    render();
  }
  function toggleSort() {
    sortDir = sortDir==='desc' ? 'asc' : 'desc';
    document.getElementById('sortBtn').innerHTML = sortDir==='desc' ? '<i class="ti ti-sort-descending"></i>' : '<i class="ti ti-sort-ascending"></i>';
    render();
  }
  function setCat(cat) {
    filter = cat;
    document.querySelectorAll('.fbtn').forEach(b => b.classList.toggle('active', b.dataset.f===cat));
    document.querySelectorAll('.cat-chip').forEach(c => c.classList.toggle('active', c.dataset.c===cat));
    render();
  }

  function getFiltered() {
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    let list = tasks.filter(t => {
      if (filter === 'toutes') return true;
      if (filter === 'en cours') return !t.done;
      if (filter === 'faites') return t.done;
      return t.cat === filter;
    });
    if (q) list = list.filter(t => t.name.toLowerCase().includes(q) || (t.note&&t.note.toLowerCase().includes(q)));
    list.sort((a,b) => sortDir==='desc' ? b.createdAt-a.createdAt : a.createdAt-b.createdAt);
    return list;
  }

  // ─── Render ───
  function renderCats() {
    const c = document.getElementById('catStrip');
    const all = tasks.length;
    c.innerHTML = `<button class="cat-chip${filter==='toutes'?' active':''}" data-c="toutes" onclick="setCat('toutes')"><i class="ti ti-layout-grid" style="font-size:14px"></i> Toutes <span class="cc">${all}</span></button>` +
      CATS.map(cat => {
        const cnt = tasks.filter(t=>t.cat===cat).length;
        return `<button class="cat-chip${filter===cat?' active':''}" data-c="${cat}" onclick="setCat('${cat}')"><span class="cd" style="background:${CAT_COLORS[cat]}"></span> ${cat} <span class="cc">${cnt}</span></button>`;
      }).join('');
  }

  function render() {
    const visible = getFiltered();
    const total = tasks.length;
    const done = tasks.filter(t=>t.done).length;
    const pct = total ? Math.round(done/total*100) : 0;

    // Hero
    document.getElementById('hero').innerHTML = `
      <div class="hero-card accent">
        <div class="h-num">${total}</div>
        <div class="h-lbl">Tâches</div>
        <div class="h-sub">${tasks.filter(t=>!t.done).length} en cours</div>
      </div>
      <div class="hero-card done">
        <div class="h-num" style="color:#22c55e">${done}</div>
        <div class="h-lbl">Effectuées</div>
        <div class="h-sub">${total ? Math.round(done/total*100) : 0}% du total</div>
      </div>
      <div class="hero-card">
        <div class="h-num" style="color:var(--accent)">${total-done}</div>
        <div class="h-lbl">Restantes</div>
        <div class="h-sub">${total ? Math.round((total-done)/total*100) : 0}% à faire</div>
      </div>
    `;

    // Progress
    document.getElementById('progressSection').innerHTML = `
      <div class="progress-label"><span>Progression</span><span>${done}/${total}</span></div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    `;

    // Filter counts
    document.getElementById('cntAll').textContent = total;
    document.getElementById('cntActive').textContent = tasks.filter(t=>!t.done).length;
    document.getElementById('cntDone').textContent = done;

    renderCats();

    // List
    const list = document.getElementById('list');
    if (!visible.length) {
      let icon = 'ti ti-checks', msg = 'Aucune tâche à afficher';
      if (filter==='en cours') { icon = 'ti ti-circle-check'; msg = 'Tout est accompli ! 🎉'; }
      else if (filter==='faites') { icon = 'ti ti-list'; msg = 'Aucune tâche effectuée pour le moment'; }
      else if (CATS.includes(filter)) { icon = 'ti ti-folder-off'; msg = `Aucune tâche en ${filter.toLowerCase()}`; }
      else if (document.getElementById('searchInput').value.trim()) { icon = 'ti ti-search-off'; msg = 'Aucun résultat pour cette recherche'; }
      list.innerHTML = `<div class="empty"><i class="${icon}"></i><p>${msg}</p></div>`;
      return;
    }

    list.innerHTML = visible.map((t,i) => {
      const ds = t.dateDone ? new Date(t.dateDone).toLocaleDateString('fr-FR', { weekday:'short', day:'numeric', month:'short' }) : null;
      return `<div class="task${t.done?' done':''}" style="animation-delay:${i*0.035}s">
        <div class="chk-wrap" onclick="toggleDone(${t.id})">
          <input type="checkbox" ${t.done?'checked':''} />
          <div class="chk-vis"></div>
        </div>
        <div class="task-body">
          <div class="tname">${esc(t.name)}</div>
          <div class="tmeta">
            <span class="badge ${catClass[t.cat]}">${t.cat}</span>
            <span class="freq"><i class="ti ti-clock"></i> ${t.freq}</span>
            ${t.note ? `<span class="freq"><i class="ti ti-note"></i> ${esc(t.note)}</span>` : ''}
          </div>
          ${t.done && ds ? `<div class="date-done"><i class="ti ti-check-circle" style="color:#22c55e"></i> Faite le ${ds}</div>` : ''}
        </div>
        <div class="task-actions">
          <button class="edit-btn" onclick="editTask(${t.id})" title="Modifier"><i class="ti ti-pencil"></i></button>
          <button class="del-btn" onclick="deleteTask(${t.id})" title="Supprimer"><i class="ti ti-trash"></i></button>
        </div>
      </div>`;
    }).join('');
  }

  function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  // ─── Events ───
  document.getElementById('modal').addEventListener('click', function(e) { if (e.target===this) closeModal(); });
  document.addEventListener('keydown', function(e) {
    if (e.key==='Escape') closeModal();
    if (e.key==='Enter' && document.getElementById('modal').classList.contains('open')) saveTask();
  });

  // ─── Init ───
  loadTheme();
  loadTasks();
  render();
</script>

</body>
</html>
