<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Chips Gestion Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="icon" href="icon.svg">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-layout">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-brand" onclick="toggleSidebar()">🍟 Chips Pro</div>
    <div class="sidebar-nav" id="sideNav"></div>
    <div class="sidebar-footer">
      <span id="syncStatus" style="font-size:10px"></span>
    </div>
  </div>
  <div class="main-area">
    <div class="top-bar" id="filterBar">
      <span class="page-title-mob" id="pageTitleMob">📊 Tableau de Bord</span>
      <select id="fPreset" onchange="setFilter(this.value)">
        <option value="all">🗓️ Toute période</option>
        <option value="today">📅 Aujourd'hui</option>
        <option value="week">📆 Cette semaine</option>
        <option value="month">📅 Ce mois</option>
        <option value="year">📅 Cette année</option>
        <option value="custom">✏️ Personnalisée</option>
      </select>
      <input type="date" id="fStart" onchange="setFilter('custom')" />
      <input type="date" id="fEnd" onchange="setFilter('custom')" />
      <span class="filter-info" id="filterInfo"></span>
      <span class="spacer"></span>
      <span class="user-info" id="userInfo"><button class="btn btn-sm btn-p" onclick="setUserName()">👤 Connexion</button></span>
      <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
      <button class="hamburger" id="hamburger" onclick="toggleNav()" aria-label="Menu">☰</button>
    </div>
    <div class="mobile-nav" id="mobileNav"></div>
    <div class="scroll-area">
      <div class="page active" id="p-dash"></div>
      <div class="page" id="p-clients"></div>
      <div class="page" id="p-commandes"></div>
      <div class="page" id="p-prod"></div>
      <div class="page" id="p-montants"></div>
      <div class="page" id="p-depenses"></div>
      <div class="page" id="p-stock"></div>
      <div class="page" id="p-finances"></div>
      <div class="page" id="p-analyses"></div>
      <div class="page" id="p-employes"></div>
      <div class="page" id="p-exporter"></div>
      <div class="page" id="p-corbeille"></div>
    </div>
  </div>
</div>

<div class="m-overlay" id="modal"><div class="m-body" id="modalBody"></div></div>

<script src="app.js"></script>
</body>
</html>
